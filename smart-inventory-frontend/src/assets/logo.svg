<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <g filter="url(#glow)">
        <!-- Main Box -->
        <path d="M 20 30 L 50 15 L 80 30 L 80 70 L 50 85 L 20 70 Z" fill="none" stroke="url(#grad1)" stroke-width="3"/>
        <!-- Top Face -->
        <path d="M 50 15 L 80 30 L 50 45 L 20 30 Z" fill="rgba(57, 255, 20, 0.1)" stroke="url(#grad1)" stroke-width="1.5"/>
        <!-- Circuit lines -->
        <path d="M 50 45 L 50 55 M 50 55 L 35 62 M 50 55 L 65 62" fill="none" stroke="url(#grad1)" stroke-width="1.5"/>
        <circle cx="35" cy="62" r="2" fill="url(#grad1)"/>
        <circle cx="65" cy="62" r="2" fill="url(#grad1)"/>
    </g>
</svg>