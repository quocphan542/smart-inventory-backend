name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry (or DockerHub)
        uses: docker/login-action@v2
        with:
          # Use docker.io for DockerHub or ghcr.io for GitHub Container Registry
          registry: ghcr.io 
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./smart-inventory-backend
          push: true
          tags: ghcr.io/${{ github.repository }}/smart-inventory-backend:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./smart-inventory-frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/smart-inventory-frontend:latest
          # You can pass build arguments to React here if you need environment variables at build time:
          # build-args: |
          #   REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}

