# =================================================
# APPLICATION CONFIGURATION
# =================================================
spring.application.name=smart-inventory-backend
server.port=8080

# =================================================
# DATABASE (MS SQL SERVER) CONFIGURATION
# =================================================
# Add properties sendStringParametersAsUnicode=true and characterEncoding=UTF-8 for Vietnamese support
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SmartInventoryDB;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;characterEncoding=UTF-8
spring.datasource.username=sa
spring.datasource.password=Thuan@230901
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =================================================
# HIBERNATE / JPA CONFIGURATION
# =================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Use newer dialect and let Spring Boot auto detect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# =================================================
# JWT SECURITY CONFIGURATION
# =================================================
# Secret key (must be long enough for HS512)
app.jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d99a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
# Token expiration time: 86400000 ms = 24 hours
app.jwt.expiration-ms=86400000

# =================================================
# WEB ENCODING
# =================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true