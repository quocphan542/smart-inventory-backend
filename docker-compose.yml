version: '3.8'

services:
  # The Spring Boot Backend
  backend:
    build: ./smart-inventory-backend
    container_name: smart-inventory-backend
    ports:
      - "8080:8080"
    environment:
      # Use host.docker.internal to connect to SQL Server running on your host machine (Windows)
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://host.docker.internal:1433;databaseName=SmartInventoryDB;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=Thuan@230901
    restart: on-failure

  # The React Frontend
  frontend:
    build: ./smart-inventory-frontend
    container_name: smart-inventory-frontend
    ports:
      - "80:80"
    restart: on-failure
    depends_on:
      - backend
